name: Refresh Pulse Data

# Two parallel data feeds:
#   1. Mirrors SuYxh/ai-news-aggregator's latest-{24h,7d}.json into docs/pulse/
#      → bilingual (mostly Chinese) pulse data for zh users.
#   2. Builds latest-7d-en.json from US/global English sources (HN Algolia +
#      AI lab RSS + GitHub Trending) → en-only pulse data for English users.
# echobird.ai/pulse/* serves both as static files (the Cloudflare Pages
# fallback for when the pulse-worker isn't deployed). Commits only when the
# payload changed, to keep git history bounded.

on:
  schedule:
    # Every 2 hours, offset 15min from the hour. Tuned to track SuYxh's
    # ~3-4h upstream cadence: most ticks pick up a new snapshot, the rest
    # no-op via the "skip-if-unchanged" guard at commit time. Worst-case
    # user-visible latency drops from ~11h (6h cron) to ~7h (2h cron + CF
    # cache TTL + client 30min refresh).
    - cron: '15 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-pulse-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install --quiet requests feedparser beautifulsoup4

      - name: Fetch upstream pulse files (zh)
        run: |
          set -euo pipefail
          mkdir -p docs/pulse
          base="https://raw.githubusercontent.com/SuYxh/ai-news-aggregator/main/data"
          for f in latest-24h.json latest-7d.json; do
            tmp="$(mktemp)"
            curl -fsSL --retry 3 --retry-delay 5 -o "$tmp" "$base/$f"
            # Sanity: must be JSON, not an HTML error page
            head -c 1 "$tmp" | grep -q '{' || { echo "::error::$f did not look like JSON"; exit 1; }
            mv "$tmp" "docs/pulse/$f"
          done
          ls -lh docs/pulse/

      # Inject aihot.virxact.com curated picks (~80/day) into the 7d feed as
      # a parallel pseudo-source. They land as site_id="aihot",
      # site_name="AI HOT 精选" and are merged by URL — when the same URL
      # appears in both pools, aihot's LLM-normalized title wins. Failure to
      # reach aihot is non-fatal: the workflow proceeds with SuYxh-only data.
      - name: Merge aihot curated picks into 7d feed
        run: python scripts/merge_aihot.py docs/pulse/latest-7d.json

      # Apply blocklist AFTER the merge so aihot items are filtered too:
      #   - host blocklist : x.com / twitter.com (individual KOL posts)
      #   - title blocklist: moderation noise + paid-placement markers
      # Re-emits total_items so the frontend's header counts stay consistent.
      - name: Filter ZH pulse files (blocklist hosts + promo titles)
        run: python scripts/filter_pulse.py docs/pulse/latest-24h.json docs/pulse/latest-7d.json

      - name: Build en-only pulse file
        run: |
          set -euo pipefail
          python scripts/build_en_pulse.py
          # Sanity: file exists and parses as JSON with at least one item
          python -c "import json,sys; d=json.load(open('docs/pulse/latest-7d-en.json',encoding='utf-8')); assert d.get('total_items',0) > 0, 'empty feed'; print(f'en feed total_items={d[\"total_items\"]}')"
          ls -lh docs/pulse/

      # Inject EchoBird-owned pinned items (e.g. our OpenRouter guide) at the
      # positions declared in scripts/pulse_pinned.json. Runs last so upstream
      # refreshes can't displace pins; script is fail-soft (exits 0 on errors)
      # so a typo in the pin config never breaks the refresh cycle.
      - name: Inject EchoBird pinned items
        run: |
          python scripts/inject_pinned.py docs/pulse/latest-24h.json   --lang zh
          python scripts/inject_pinned.py docs/pulse/latest-7d.json    --lang zh
          python scripts/inject_pinned.py docs/pulse/latest-7d-en.json --lang en

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pulse/latest-24h.json docs/pulse/latest-7d.json docs/pulse/latest-7d-en.json
          if git diff --cached --quiet; then
            echo "No pulse changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(pulse): refresh upstream snapshot"
          git push

      # Mirror to Tencent COS (Hong Kong) so mainland-China users have a
      # GFW-friendly source. Runs every cycle (idempotent overwrite, ~10MB)
      # so a one-off upload failure self-heals on the next run. The mirror is
      # a secondary fallback — the primary feed (git -> Cloudflare Pages) is
      # already committed by this point — so COS is best-effort: marked
      # continue-on-error, with a per-file timeout so an intermittent COS
      # network blip (common from GitHub's Azure-hosted runners) degrades to a
      # warning annotation instead of failing the whole refresh.
      - name: Mirror to Tencent COS
        continue-on-error: true
        env:
          TENCENT_COS_SECRET_ID:  ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_BUCKET:     ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION:     ${{ secrets.TENCENT_COS_REGION }}
        run: |
          set -uo pipefail
          python3 -m pip install --quiet coscmd
          coscmd config \
            -a "$TENCENT_COS_SECRET_ID" \
            -s "$TENCENT_COS_SECRET_KEY" \
            -b "$TENCENT_COS_BUCKET" \
            -r "$TENCENT_COS_REGION"
          for f in latest-24h.json latest-7d.json latest-7d-en.json; do
            timeout 90 coscmd upload "docs/pulse/$f" "/$f" \
              || echo "::warning::COS mirror failed for $f (non-fatal, self-heals next run)"
          done
